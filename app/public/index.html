<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Incode Snake</title>
    <style>
      :root {
        --green: #248232;
        --green-dark: #1d6b29;
        --panel: #173f1a;
        --black: #111111;
        --red: #d62828;
        --grey: #7a7a7a;
        --white: #f3f3f3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #103714, #0c260f);
        color: var(--white);
        font-family: "Courier New", Courier, monospace;
      }

      .game-shell {
        width: min(94vw, 760px);
        background: var(--panel);
        border: 4px solid #0b240d;
        border-radius: 18px;
        box-shadow: 0 22px 60px rgba(0, 0, 0, 0.35);
        padding: 20px;
      }

      .title {
        text-align: center;
        margin-bottom: 14px;
      }

      .title h1 {
        margin: 0 0 8px;
        font-size: clamp(1.8rem, 4vw, 2.5rem);
      }

      .title p {
        margin: 0;
        color: #d7ecd9;
      }

      .scoreboard {
        text-align: center;
        background: var(--green-dark);
        color: var(--white);
        border: 3px solid #0b240d;
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 16px;
        font-size: clamp(1rem, 2vw, 1.3rem);
        font-weight: 700;
      }

      .board-wrap {
        background: var(--green);
        border: 4px solid #0b240d;
        border-radius: 12px;
        padding: 8px;
      }

      canvas {
        display: block;
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
        aspect-ratio: 1 / 1;
        background: var(--green);
      }

      .controls {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: center;
        margin-top: 16px;
        flex-wrap: wrap;
      }

      .controls p {
        margin: 0;
        color: #d7ecd9;
      }

      button {
        border: 0;
        background: #f4f4f4;
        color: #102512;
        border-radius: 10px;
        padding: 12px 18px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      input {
        border: 0;
        border-radius: 10px;
        padding: 12px 14px;
        font: inherit;
        min-width: 180px;
      }

      .status {
        min-height: 1.3em;
        color: #ffe38a;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 230px;
        gap: 18px;
      }

      .leaderboard {
        background: var(--green-dark);
        border: 4px solid #0b240d;
        border-radius: 12px;
        padding: 12px;
      }

      .leaderboard h2 {
        margin: 0 0 12px;
        font-size: 1.1rem;
        text-align: center;
      }

      .leaderboard ol {
        margin: 0;
        padding-left: 24px;
      }

      .leaderboard li {
        margin-bottom: 8px;
      }

      .leaderboard-empty {
        margin: 0;
        color: #d7ecd9;
        text-align: center;
      }

      @media (max-width: 640px) {
        .controls {
          flex-direction: column;
          align-items: stretch;
        }

        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="game-shell">
      <header class="title">
        <h1>Incode Snake</h1>
        <p>GOOD LUCK, HAVE FUN!!!</p>
      </header>

      <section class="scoreboard">
        Score: <span id="score">0</span>
        &nbsp;&nbsp; High Score: <span id="high-score">0</span>
      </section>

      <section class="layout">
        <div class="board-wrap">
          <canvas id="board" width="600" height="600" aria-label="Snake game board"></canvas>
        </div>

        <aside class="leaderboard">
          <h2>Leaderboard</h2>
          <p id="leaderboard-empty" class="leaderboard-empty">Loading scores...</p>
          <ol id="leaderboard-list" hidden></ol>
        </aside>
      </section>

      <section class="controls">
        <p>Use W A S D or arrow keys to move.</p>
        <input id="username-input" type="text" maxlength="32" placeholder="Your username">
        <p class="status" id="status">Press restart to play.</p>
        <button id="restart-button" type="button">Restart</button>
      </section>
    </main>

    <script src="./config.js"></script>
    <script>
      const canvas = document.getElementById("board");
      const context = canvas.getContext("2d");
      const scoreElement = document.getElementById("score");
      const highScoreElement = document.getElementById("high-score");
      const statusElement = document.getElementById("status");
      const restartButton = document.getElementById("restart-button");
      const usernameInput = document.getElementById("username-input");
      const leaderboardList = document.getElementById("leaderboard-list");
      const leaderboardEmpty = document.getElementById("leaderboard-empty");

      const step = 20;
      const boardLimit = 600;
      const startDelay = 100;

      let delay = startDelay;
      let score = 0;
      let highScore = Number(localStorage.getItem("snake-high-score") || "0");
      let loopHandle = null;
      let submittingScore = false;
      let runStarted = false;
      const apiBaseUrl =
        window.SNAKE_CONFIG?.apiBaseUrl ||
        localStorage.getItem("snake-api-base-url") ||
        "http://localhost:8080";

      const state = {
        head: { x: 0, y: 0 },
        direction: "stop",
        nextDirection: "stop",
        food: { x: 0, y: 100 },
        segments: [],
      };

      highScoreElement.textContent = String(highScore);
      usernameInput.value = localStorage.getItem("snake-username") || "";

      async function loadLeaderboard() {
        try {
          const response = await fetch(`${apiBaseUrl}/api/scores`);
          if (!response.ok) {
            throw new Error("failed to load leaderboard");
          }

          const payload = await response.json();
          renderLeaderboard(payload.scores || []);
        } catch (error) {
          leaderboardList.hidden = true;
          leaderboardEmpty.hidden = false;
          leaderboardEmpty.textContent = "Leaderboard unavailable.";
        }
      }

      function renderLeaderboard(scores) {
        leaderboardList.innerHTML = "";

        if (!scores.length) {
          leaderboardList.hidden = true;
          leaderboardEmpty.hidden = false;
          leaderboardEmpty.textContent = "No scores yet.";
          return;
        }

        scores.forEach((entry) => {
          const item = document.createElement("li");
          item.textContent = `${entry.username} - ${entry.highest_score ?? entry.score}`;
          leaderboardList.appendChild(item);
        });

        leaderboardEmpty.hidden = true;
        leaderboardList.hidden = false;
      }

      async function submitScore(finalScore) {
        const username = usernameInput.value.trim();
        if (!username || finalScore <= 0 || submittingScore) {
          return;
        }

        submittingScore = true;
        localStorage.setItem("snake-username", username);

        try {
          const response = await fetch(`${apiBaseUrl}/api/scores`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              username,
              score: finalScore,
            }),
          });

          if (!response.ok) {
            throw new Error("failed to save score");
          }

          await loadLeaderboard();
          statusElement.textContent = `Collision. Saved ${finalScore} for ${username}.`;
        } catch (error) {
          statusElement.textContent = "Collision. Score could not be saved.";
        } finally {
          submittingScore = false;
        }
      }

      function randomCoordinate() {
        return (Math.floor(Math.random() * 29) - 14) * 20;
      }

      function randomFoodPosition() {
        let x = randomCoordinate();
        let y = randomCoordinate();

        while (
          (state.head.x === x && state.head.y === y) ||
          state.segments.some((segment) => segment.x === x && segment.y === y)
        ) {
          x = randomCoordinate();
          y = randomCoordinate();
        }

        return { x, y };
      }

      function resetGame() {
        delay = startDelay;
        score = 0;
        runStarted = false;
        state.head = { x: 0, y: 0 };
        state.direction = "stop";
        state.nextDirection = "stop";
        state.food = { x: 0, y: 100 };
        state.segments = [];
        scoreElement.textContent = "0";
        statusElement.textContent = "Click Start to begin a new run.";
        restartButton.textContent = "Start";
        draw();
      }

      function startRun() {
        runStarted = true;
        state.direction = "right";
        state.nextDirection = "right";
        statusElement.textContent = "Game running.";
        restartButton.textContent = "Restart";
        usernameInput.blur();
      }

      function setDirection(nextDirection) {
        const opposite = {
          up: "down",
          down: "up",
          left: "right",
          right: "left",
        };

        if (state.direction !== "stop" && opposite[state.direction] === nextDirection) {
          return;
        }

        state.nextDirection = nextDirection;
      }

      function moveHead() {
        if (state.direction === "up") {
          state.head.y += step;
        } else if (state.direction === "down") {
          state.head.y -= step;
        } else if (state.direction === "left") {
          state.head.x -= step;
        } else if (state.direction === "right") {
          state.head.x += step;
        }
      }

      function drawSquare(x, y, color) {
        const px = x + boardLimit / 2;
        const py = boardLimit / 2 - y - step;
        context.fillStyle = color;
        context.fillRect(px, py, step, step);
      }

      function drawCircle(x, y, color) {
        const px = x + boardLimit / 2 + step / 2;
        const py = boardLimit / 2 - y - step / 2;
        context.fillStyle = color;
        context.beginPath();
        context.arc(px, py, step / 2, 0, Math.PI * 2);
        context.fill();
      }

      function draw() {
        context.clearRect(0, 0, boardLimit, boardLimit);
        context.fillStyle = "#248232";
        context.fillRect(0, 0, boardLimit, boardLimit);

        drawCircle(state.food.x, state.food.y, "#d62828");
        drawSquare(state.head.x, state.head.y, "#111111");

        state.segments.forEach((segment) => drawSquare(segment.x, segment.y, "#7a7a7a"));
      }

      function resetAfterCollision() {
        const finalScore = score;
        runStarted = false;
        state.head = { x: 0, y: 0 };
        state.direction = "stop";
        state.nextDirection = "stop";
        state.segments = [];
        score = 0;
        delay = startDelay;
        scoreElement.textContent = "0";
        statusElement.textContent = "Collision. Click Start for a new run.";
        restartButton.textContent = "Start";
        submitScore(finalScore);
      }

      function checkBorderCollision() {
        return (
          state.head.x > 280 ||
          state.head.x < -280 ||
          state.head.y > 280 ||
          state.head.y < -280
        );
      }

      function checkBodyCollision() {
        return state.segments.some(
          (segment) => segment.x === state.head.x && segment.y === state.head.y
        );
      }

      function updateSegments(previousHead) {
        for (let index = state.segments.length - 1; index > 0; index -= 1) {
          state.segments[index] = { ...state.segments[index - 1] };
        }

        if (state.segments.length > 0) {
          state.segments[0] = previousHead;
        }
      }

      function tick() {
        if (!runStarted) {
          draw();
          return;
        }

        if (state.nextDirection !== "stop") {
          state.direction = state.nextDirection;
        }

        if (state.direction === "stop") {
          draw();
          return;
        }

        const previousHead = { ...state.head };
        updateSegments(previousHead);
        moveHead();

        if (checkBorderCollision() || checkBodyCollision()) {
          resetAfterCollision();
          draw();
          return;
        }

        const ateFood =
          Math.abs(state.head.x - state.food.x) < 20 &&
          Math.abs(state.head.y - state.food.y) < 20;

        if (ateFood) {
          state.food = randomFoodPosition();
          state.segments.push(previousHead);
          delay = Math.max(45, delay - 1);
          score += 10;

          if (score > highScore) {
            highScore = score;
            localStorage.setItem("snake-high-score", String(highScore));
            highScoreElement.textContent = String(highScore);
          }

          scoreElement.textContent = String(score);
          statusElement.textContent = "Nice. Keep going.";
        }

        draw();
      }

      function startLoop() {
        if (loopHandle !== null) {
          clearInterval(loopHandle);
        }

        loopHandle = setInterval(() => {
          tick();

          if (loopHandle !== null) {
            clearInterval(loopHandle);
            startLoop();
          }
        }, delay);
      }

      document.addEventListener("keydown", (event) => {
        if (document.activeElement === usernameInput) {
          return;
        }

        if (!runStarted) {
          return;
        }

        switch (event.key.toLowerCase()) {
          case "w":
          case "arrowup":
            event.preventDefault();
            setDirection("up");
            break;
          case "s":
          case "arrowdown":
            event.preventDefault();
            setDirection("down");
            break;
          case "a":
          case "arrowleft":
            event.preventDefault();
            setDirection("left");
            break;
          case "d":
          case "arrowright":
            event.preventDefault();
            setDirection("right");
            break;
        }
      });

      restartButton.addEventListener("click", () => {
        resetGame();
        startRun();
      });

      resetGame();
      startLoop();
      loadLeaderboard();
    </script>
  </body>
</html>
