apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "snake-api.fullname" . }}
  labels:
    {{- include "snake-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "snake-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "snake-api.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PORT
              value: {{ .Values.app.port | quote }}
            - name: CORS_ORIGIN
              value: {{ .Values.app.corsOrigin | quote }}
            - name: LEADERBOARD_LIMIT
              value: {{ .Values.app.leaderboardLimit | quote }}
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "snake-api.dbSecretName" . }}
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "snake-api.dbSecretName" . }}
                  key: port
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "snake-api.dbSecretName" . }}
                  key: dbname
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "snake-api.dbSecretName" . }}
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "snake-api.dbSecretName" . }}
                  key: password
            - name: DB_SSLMODE
              value: {{ .Values.db.sslMode | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
