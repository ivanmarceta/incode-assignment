image:
  repository: ghcr.io/your-user/incode-snake-backend
  tag: latest
  pullPolicy: Always
  pullSecrets:
    - ghcr-pull

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
  host: ""
  path: /
  pathType: Prefix
  tls: []

app:
  corsOrigin: "*"

db:
  createSecret: false
  existingSecretName: demo-api-db
  sslMode: require

monitoring:
  serviceMonitor:
    enabled: false
    additionalLabels:
      release: monitoring
