apiVersion: v1
kind: ConfigMap
metadata:
  name: snake-api-dashboard
  labels:
    app.kubernetes.io/name: snake-grafana-dashboards
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- range $key, $value := .Values.labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  annotations:
    {{- range $key, $value := .Values.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
data:
  snake-api-overview.json: |
{{ .Files.Get "dashboards/snake-api-overview.json" | indent 4 }}
